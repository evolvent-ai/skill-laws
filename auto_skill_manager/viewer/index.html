<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Manager Report Viewer</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6fb; color: #1f2937; }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 32px; border-radius: 16px; margin-bottom: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    h1 { margin: 0 0 8px; font-size: 2rem; }
    .subtitle { opacity: 0.9; }
    .toolbar, .section { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08); margin-bottom: 24px; }
    body.share-mode header { padding: 24px 28px; margin-bottom: 18px; }
    body.share-mode .toolbar { padding: 18px 20px; margin-bottom: 18px; }
    body.share-mode .container { max-width: 1240px; padding: 18px; }
    body.share-mode .section { padding: 20px; margin-bottom: 18px; }
    body.share-mode .share-hidden { display: none !important; }
    body.share-mode .share-priority { box-shadow: 0 10px 28px rgba(79, 70, 229, 0.12); border: 1px solid #c7d2fe; }
    body.share-mode .grid-two.share-focus-grid { grid-template-columns: 1.6fr 0.9fr; }
    .toolbar-actions { display: flex; justify-content: flex-end; gap: 12px; align-items: center; }
    .toolbar input, .toolbar select { display: block; margin-top: 12px; }
    .toolbar-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 16px; align-items: end; }
    .control label { display: block; font-size: 0.85rem; color: #6b7280; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em; }
    .control input, .control select { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 0.95rem; }
    .pill-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    .pill { background: #eef2ff; color: #4338ca; border-radius: 999px; padding: 6px 12px; font-size: 0.85rem; font-weight: 600; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
    .stat-card { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 12px; padding: 18px; }
    .stat-card.metric-card { transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease; }
    .stat-card.metric-card:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08); }
    .delta-positive { border-color: #86efac; background: linear-gradient(180deg, #f0fdf4 0%, #ffffff 100%); }
    .delta-negative { border-color: #fca5a5; background: linear-gradient(180deg, #fef2f2 0%, #ffffff 100%); }
    .delta-neutral { border-color: #d1d5db; background: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%); }
    .delta-chip { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 4px 10px; font-size: 0.78rem; font-weight: 700; }
    .delta-chip.positive { background: #dcfce7; color: #166534; }
    .delta-chip.negative { background: #fee2e2; color: #991b1b; }
    .delta-chip.neutral { background: #e5e7eb; color: #374151; }
    .delta-text-positive { color: #166534; font-weight: 700; }
    .delta-text-negative { color: #b91c1c; font-weight: 700; }
    .delta-text-neutral { color: #6b7280; font-weight: 700; }
    .changed-row { background: linear-gradient(90deg, rgba(79,70,229,0.08) 0%, rgba(79,70,229,0) 100%); }
    .added-row { background: linear-gradient(90deg, rgba(34,197,94,0.12) 0%, rgba(34,197,94,0) 100%); }
    .removed-row { background: linear-gradient(90deg, rgba(239,68,68,0.12) 0%, rgba(239,68,68,0) 100%); }
    .split-stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-top: 12px; }
    .mini-stat { border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px 12px; background: #fff; }
    .stat-label { font-size: 0.85rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-value { font-size: 1.8rem; font-weight: 700; margin-top: 8px; color: #4f46e5; }
    .grid-two { display: grid; grid-template-columns: 1.3fr 1fr; gap: 24px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; border-bottom: 1px solid #e5e7eb; text-align: left; font-size: 0.95rem; }
    th { color: #6b7280; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .queue { display: grid; gap: 12px; }
    .queue-card.action-impact-card.filtered-row { opacity: 0.58; }
    .queue-card.action-impact-card.related-row { border-left-color: #8b5cf6; background: linear-gradient(90deg, rgba(139,92,246,0.08) 0%, rgba(255,255,255,1) 100%); }
    .stat-card.metric-card.related-row { box-shadow: 0 8px 20px rgba(99,102,241,0.08); border-color: #818cf8; }
    .queue-card.action-list-card { cursor: pointer; transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, opacity 160ms ease; }
    .queue-card.action-list-card:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08); }
    .queue-card.action-list-card.active-row { border-color: #4338ca; background: linear-gradient(90deg, rgba(99,102,241,0.12) 0%, rgba(255,255,255,1) 100%); }
    .queue-card.action-list-card.related-row { border-color: #8b5cf6; background: linear-gradient(90deg, rgba(139,92,246,0.08) 0%, rgba(255,255,255,1) 100%); }
    .queue-card.recommendation-card { cursor: pointer; transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, opacity 160ms ease; }
    .queue-card.recommendation-card:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08); }
    .queue-card.recommendation-card.active-row { border-color: #4338ca; background: linear-gradient(90deg, rgba(99,102,241,0.12) 0%, rgba(255,255,255,1) 100%); }
    .queue-card.recommendation-card.related-row { border-color: #8b5cf6; background: linear-gradient(90deg, rgba(139,92,246,0.08) 0%, rgba(255,255,255,1) 100%); }
    .queue-card.recommendation-card.filtered-row { opacity: 0.58; }
    .decision-badge { border-radius: 999px; padding: 4px 10px; font-size: 0.78rem; font-weight: 700; display: inline-flex; align-items: center; }
    .decision-badge.accepted { background: #dcfce7; color: #166534; }
    .decision-badge.dismissed { background: #fee2e2; color: #991b1b; }
    .decision-badge.needs_review { background: #fef3c7; color: #92400e; }
    .decision-controls { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .decision-button { appearance: none; border: 1px solid #d1d5db; background: #fff; color: #374151; border-radius: 999px; padding: 7px 12px; font-size: 0.82rem; font-weight: 700; cursor: pointer; }
    .decision-button.active.accepted { border-color: #22c55e; background: #dcfce7; color: #166534; }
    .decision-button.active.dismissed { border-color: #ef4444; background: #fee2e2; color: #991b1b; }
    .decision-button.active.needs_review { border-color: #f59e0b; background: #fef3c7; color: #92400e; }
    .decision-summary-card { border: 1px solid #fde68a; background: linear-gradient(180deg, #fffbeb 0%, #ffffff 100%); }
    .decision-summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .decision-summary-value { font-size: 1.5rem; font-weight: 700; margin-top: 6px; color: #92400e; }
    .operations-panel { border: 1px solid #c7d2fe; background: linear-gradient(180deg, #eef2ff 0%, #ffffff 100%); }
    .operations-grid { display: grid; grid-template-columns: 1.2fr 0.9fr; gap: 18px; }
    .operations-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    .operations-list { display: grid; gap: 10px; margin-top: 14px; }
    .operations-item { border: 1px solid #dbeafe; border-radius: 12px; padding: 12px 14px; background: rgba(255,255,255,0.92); }
    .operations-item strong { display: block; }
    .operations-item .muted { margin-top: 6px; }
    .decision-summary-item { cursor: pointer; }
    .decision-summary-item.active { border-color: #f59e0b; box-shadow: 0 6px 18px rgba(245, 158, 11, 0.12); }
    .skill-detail-card { border-top: 1px dashed #c7d2fe; padding: 14px 0 4px; }
    .metric-detail-card { margin-top: 14px; border-top: 1px dashed #c7d2fe; padding-top: 14px; }
    .clickable-row { cursor: pointer; }
    .clickable-row:hover { background: #eef2ff; }
    .clickable-row.active-row { background: #e0e7ff; }
    .action-link { appearance: none; border: 0; background: transparent; color: #4338ca; font-weight: 600; cursor: pointer; padding: 0; }
    .focus-summary { border: 1px solid #c7d2fe; background: linear-gradient(180deg, #eef2ff 0%, #ffffff 100%); }
    .focus-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    .focus-card { border: 1px solid #dbeafe; border-radius: 12px; padding: 14px; background: rgba(255,255,255,0.9); }
    .focus-card.active { border-color: #818cf8; box-shadow: 0 6px 18px rgba(99,102,241,0.12); }
    .focus-card .pill-row { margin-top: 10px; }
    .muted { color: #6b7280; }
    .focus-note { margin-top: 12px; color: #374151; line-height: 1.6; }
    .skill-detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
    .graph-panel { border: 1px solid #dbeafe; background: linear-gradient(180deg, #f8fbff 0%, #ffffff 100%); }
    .graph-panel.share-compact { padding: 16px; }
    .graph-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
    .graph-legend { display: flex; flex-wrap: wrap; gap: 8px; }
    .graph-legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #4b5563; }
    .graph-swatch { width: 10px; height: 10px; border-radius: 999px; display: inline-block; }
    .graph-swatch.center { background: #4338ca; }
    .graph-swatch.related { background: #a5b4fc; }
    .graph-swatch.metric { background: #67e8f9; }
    .graph-swatch.pair { background: #f59e0b; }
    .graph-swatch.recommendation { background: #10b981; }
    .graph-grid { display: grid; gap: 12px; }
    .graph-node { border: 1px solid #c7d2fe; border-radius: 14px; padding: 14px; background: #fff; cursor: pointer; transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease; }
    .graph-node:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08); }
    .graph-node.center { border-color: #4338ca; box-shadow: 0 8px 20px rgba(67, 56, 202, 0.12); }
    .graph-node.related { border-color: #a5b4fc; }
    .graph-node.pair { border-color: #f59e0b; background: linear-gradient(180deg, #fffbeb 0%, #ffffff 100%); }
    .graph-node.recommendation { border-color: #10b981; background: linear-gradient(180deg, #ecfdf5 0%, #ffffff 100%); }
    .graph-node-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .graph-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .graph-link { font-size: 0.85rem; color: #4b5563; padding-left: 14px; position: relative; }
    .graph-link::before { content: '↳'; position: absolute; left: 0; color: #6366f1; }
    .graph-empty { color: #6b7280; }
    pre { white-space: pre-wrap; word-break: break-word; background: #0f172a; color: #e2e8f0; padding: 16px; border-radius: 12px; overflow: auto; }
    @media (max-width: 960px) { .grid-two { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Skill Manager Report Viewer</h1>
      <p class="subtitle">Load a JSON report generated by <code>auto-skill-manager report library --format json</code>, <code>auto-skill-manager inspect skill --format json</code>, or <code>auto-skill-manager optimize apply --format json</code>.</p>
    </header>

    <div class="toolbar">
      <div class="toolbar-grid">
        <div class="control">
          <label for="reportFile"><strong>Choose report JSON</strong></label>
          <input id="reportFile" type="file" accept="application/json">
        </div>
        <div class="control">
          <label for="skillFilter">Filter skills</label>
          <input id="skillFilter" type="text" placeholder="skill id or family">
        </div>
        <div class="control">
          <label for="sortBy">Sort risk table</label>
          <select id="sortBy">
            <option value="rewrite_priority">Rewrite priority</option>
            <option value="black_hole_risk">Black-hole risk</option>
            <option value="competition_score">Competition score</option>
            <option value="anchor_strength_score">Anchor strength</option>
          </select>
        </div>
      </div>
      <div class="toolbar-actions">
        <button id="shareModeToggle" class="action-link" type="button">Enable share mode</button>
      </div>
      <p class="muted">This viewer is static and reads the report locally in the browser.</p>
    </div>

    <div id="app"></div>
  </div>

  <script>
    const fileInput = document.getElementById('reportFile');
    const skillFilterInput = document.getElementById('skillFilter');
    const sortBySelect = document.getElementById('sortBy');
    const shareModeToggle = document.getElementById('shareModeToggle');
    const app = document.getElementById('app');
    let currentReport = null;
    let recommendationDecisions = {};
    let selectedSkillId = '';
    let selectedPair = null;
    let selectedActionId = '';
    let selectedMetric = '';
    let selectedDecisionFilter = '';
    let shareMode = false;

    fileInput.addEventListener('change', async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      const text = await file.text();
      try {
        currentReport = JSON.parse(text);
        restoreRecommendationDecisions(currentReport);
        selectedSkillId = '';
        selectedPair = null;
        selectedActionId = '';
        selectedMetric = '';
        selectedRecommendationId = '';
        syncHashState();
        renderReport(currentReport);
      } catch (error) {
        app.innerHTML = `<div class="section"><h2>Invalid JSON</h2><pre>${String(error)}</pre></div>`;
      }
    });

    skillFilterInput.addEventListener('input', () => {
      syncHashState();
      if (currentReport) renderReport(currentReport);
    });

    sortBySelect.addEventListener('change', () => {
      syncHashState();
      if (currentReport) renderReport(currentReport);
    });

    shareModeToggle.addEventListener('click', () => {
      shareMode = !shareMode;
      applyShareMode();
      syncHashState();
      if (currentReport) renderReport(currentReport);
    });

    function applyShareMode() {
      document.body.classList.toggle('share-mode', shareMode);
      shareModeToggle.textContent = shareMode ? 'Disable share mode' : 'Enable share mode';
    }

    function shareModePill() {
      return shareMode ? '<span class="pill">share=on</span>' : '';
    }

    function shareModeSectionClass(priority = false, hidden = false) {
      return [priority ? 'share-priority' : '', hidden ? 'share-hidden' : ''].filter(Boolean).join(' ');
    }

    function loadStateFromHash() {
      const params = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      const filter = params.get('filter') || '';
      const sort = params.get('sort') || 'rewrite_priority';
      const selected = params.get('selected') || '';
      const pair = params.get('pair') || '';
      const action = params.get('action') || '';
      const metric = params.get('metric') || '';
      const recommendation = params.get('recommendation') || '';
      const decisions = params.get('decisions') || '';
      const decisionFilter = params.get('decision_filter') || '';
      shareMode = params.get('share') === '1';
      skillFilterInput.value = filter;
      sortBySelect.value = ['rewrite_priority', 'black_hole_risk', 'competition_score', 'anchor_strength_score'].includes(sort)
        ? sort
        : 'rewrite_priority';
      selectedSkillId = selected;
      selectedActionId = action;
      selectedMetric = metric;
      selectedRecommendationId = recommendation;
      selectedDecisionFilter = ['accepted', 'dismissed', 'needs_review'].includes(decisionFilter) ? decisionFilter : '';
      if (pair.includes('::')) {
        const [leftSkillId, rightSkillId] = pair.split('::');
        selectedPair = leftSkillId && rightSkillId ? { left_skill_id: leftSkillId, right_skill_id: rightSkillId } : null;
      } else {
        selectedPair = null;
      }
      if (decisions) {
        try {
          recommendationDecisions = JSON.parse(decodeURIComponent(decisions));
        } catch (_error) {
          recommendationDecisions = recommendationDecisions || {};
        }
      }
      applyShareMode();
    }

    function syncHashState() {
      const params = new URLSearchParams();
      const filter = skillFilterInput.value.trim();
      if (filter) params.set('filter', filter);
      if (sortBySelect.value && sortBySelect.value !== 'rewrite_priority') params.set('sort', sortBySelect.value);
      if (selectedSkillId) params.set('selected', selectedSkillId);
      if (selectedActionId) params.set('action', selectedActionId);
      if (selectedMetric) params.set('metric', selectedMetric);
      if (selectedRecommendationId) params.set('recommendation', selectedRecommendationId);
      if (selectedDecisionFilter) params.set('decision_filter', selectedDecisionFilter);
      if (shareMode) params.set('share', '1');
      if (selectedPair) params.set('pair', `${selectedPair.left_skill_id}::${selectedPair.right_skill_id}`);
      if (Object.keys(recommendationDecisions).length) params.set('decisions', encodeURIComponent(JSON.stringify(recommendationDecisions)));
      const nextHash = params.toString();
      if (window.location.hash.replace(/^#/, '') !== nextHash) {
        window.location.hash = nextHash;
      }
    }

    window.addEventListener('hashchange', () => {
      loadStateFromHash();
      if (currentReport) renderReport(currentReport);
    });

    loadStateFromHash();

    function renderReport(report) {
      if (report.report_type === 'skill_manager_optimization') {
        renderOptimizationReport(report);
        return;
      }
      if (report.report_type === 'skill_manager_library_diff') {
        renderLibraryDiffReport(report);
        return;
      }
      const highlights = report.highlights || {};
      const library = report.sections?.library || report.library_scorecard || {};
      const allRiskRows = report.views?.risk_table || [];
      const allConflictRows = report.views?.conflict_queue || [];
      const allRecommendationRows = hydrateRecommendationRows(report.views?.recommendation_queue || []);
      const recommendationDecisionSummary = summarizeRecommendationDecisions(allRecommendationRows);
      const selectedRecommendation = selectedRecommendationId
        ? allRecommendationRows.find(item => item.id === selectedRecommendationId) || null
        : null;
      const recommendationSkillSet = new Set(selectedRecommendation?.skill_ids || []);
      const riskTable = filterAndSortRiskTable(allRiskRows, recommendationSkillSet);
      const conflictQueue = filterConflictQueue(allConflictRows, recommendationSkillSet);
      const recommendationQueue = filterRecommendationQueue(allRecommendationRows);
      const operationsPanel = renderOperationsPanel(recommendationQueue, recommendationDecisionSummary);
      const skillFocus = report.views?.skill_focus || null;
      const isSkillInspection = Boolean(highlights.is_skill_inspection);
      const activeFilter = skillFilterInput.value.trim();
      const effectiveFocus = selectedSkillId || activeFilter || (skillFocus?.skill_id || '');
      const pairLabel = selectedPair ? `${selectedPair.left_skill_id}↔${selectedPair.right_skill_id}` : '';
      const detailsPanel = renderDetailsPanel(allRiskRows, allConflictRows, allRecommendationRows, selectedRecommendation);

      app.innerHTML = `
        <div class="section ${shareModeSectionClass(true, false)}">
          <h2>${isSkillInspection ? 'Skill Inspection Overview' : 'Library Overview'}</h2>
          ${isSkillInspection ? renderSkillFocus(skillFocus) : ''}
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Library</div><div class="stat-value">${library.library_id || 'unknown'}</div></div>
            <div class="stat-card"><div class="stat-label">Health</div><div class="stat-value">${highlights.health_status || 'unknown'}</div></div>
            <div class="stat-card"><div class="stat-label">Skills</div><div class="stat-value">${library.size ?? '-'}</div></div>
            <div class="stat-card"><div class="stat-label">Routing Stability</div><div class="stat-value">${library.predicted_routing_stability ?? '-'}</div></div>
            <div class="stat-card"><div class="stat-label">Competition Density</div><div class="stat-value">${library.competition_density ?? '-'}</div></div>
            <div class="stat-card"><div class="stat-label">Black-hole Exposure</div><div class="stat-value">${library.predicted_black_hole_exposure ?? '-'}</div></div>
          </div>
          <div class="pill-row">
            <span class="pill">report=${report.report_type || 'unknown'}</span>
            <span class="pill">health=${highlights.health_status || 'unknown'}</span>
            ${shareModePill()}
            ${activeFilter ? `<span class="pill">filter=${activeFilter}</span>` : ''}
            ${selectedSkillId ? `<span class="pill">selected=${selectedSkillId}</span>` : ''}
            ${selectedRecommendationId ? `<span class="pill">recommendation=${selectedRecommendationId}</span>` : ''}
            <span class="pill">sort=${sortBySelect.value}</span>
          </div>
          <div class="pill-row">
            <button class="action-link" type="button" onclick="exportCurrentView()">Export current view</button>
            ${(effectiveFocus || selectedPair || selectedRecommendationId) ? `<button class="action-link" type="button" onclick="clearSelections()">Clear focus</button>` : ''}
          </div>
        </div>

        ${recommendationDecisionSummary.total ? `
          <div class="section decision-summary-card ${shareModeSectionClass(false, shareMode && !selectedRecommendationId)}">
            <h2>Recommendation Decisions</h2>
            <div class="decision-summary-grid">
              <div class="stat-card decision-summary-item ${selectedDecisionFilter === '' ? 'active' : ''}" onclick="setDecisionFilter('')">
                <div class="stat-label">Tracked</div>
                <div class="decision-summary-value">${recommendationDecisionSummary.total}</div>
              </div>
              <div class="stat-card decision-summary-item ${selectedDecisionFilter === 'accepted' ? 'active' : ''}" onclick="setDecisionFilter('accepted')">
                <div class="stat-label">Accepted</div>
                <div class="decision-summary-value">${recommendationDecisionSummary.accepted}</div>
              </div>
              <div class="stat-card decision-summary-item ${selectedDecisionFilter === 'dismissed' ? 'active' : ''}" onclick="setDecisionFilter('dismissed')">
                <div class="stat-label">Dismissed</div>
                <div class="decision-summary-value">${recommendationDecisionSummary.dismissed}</div>
              </div>
              <div class="stat-card decision-summary-item ${selectedDecisionFilter === 'needs_review' ? 'active' : ''}" onclick="setDecisionFilter('needs_review')">
                <div class="stat-label">Needs Review</div>
                <div class="decision-summary-value">${recommendationDecisionSummary.needs_review}</div>
              </div>
            </div>
          </div>
        ` : ''}

        ${operationsPanel}

        ${shareMode ? '' : detailsPanel}

        ${renderNeighborhoodPanel({
          reportType: report.report_type,
          riskRows: allRiskRows,
          conflictRows: allConflictRows,
          recommendationRows: allRecommendationRows,
          skillRows: [],
          actionCards: [],
          metricCards: [],
        })}

        <div class="grid-two ${shareMode ? 'share-focus-grid' : ''}">
          <div class="section ${shareModeSectionClass(true, false)}">
            <h2>${isSkillInspection ? 'Skill Risk Table' : 'Risk Table'}</h2>
            ${renderRiskTable(riskTable)}
          </div>
          <div>
            <div class="section ${shareModeSectionClass(false, shareMode && !selectedRecommendationId)}">

        actionImpactCards,

        : 'No action focus';

      const relatedActionCount = actionImpactCards.length;
      const focusedChangedCount = filteredSkillRows.filter(row => row.changed).length;

      if (!selectedMetric && !selectedActionId && !selectedSkillId) {
