    function renderNeighborhoodPanel(context) {
      const {
        reportType,
        riskRows = [],
        conflictRows = [],
        recommendationRows = [],
        skillRows = [],
        actionCards = [],
        metricCards = [],
      } = context;
      const centerSkillId = selectedSkillId || inferCenterSkill({ riskRows, skillRows, actionCards, recommendationRows, conflictRows });
      const nodes = buildNeighborhoodNodes({
        centerSkillId,
        riskRows,
        conflictRows,
        recommendationRows,
        skillRows,
        actionCards,
        metricCards,
      });
      if (!nodes.length) return '';
      return `
        <div class="section graph-panel ${shareMode ? 'share-compact' : ''} ${shareModeSectionClass(false, false)}">
          <div class="graph-header">
            <div>
              <h2>Neighborhood View</h2>
              <div class="pill-row">
                <span class="pill">report=${reportType || 'unknown'}</span>
                ${centerSkillId ? `<span class="pill">center=${centerSkillId}</span>` : '<span class="pill">center=auto</span>'}
                ${selectedMetric ? `<span class="pill">metric=${selectedMetric}</span>` : ''}
                ${selectedActionId ? `<span class="pill">action=${selectedActionId}</span>` : ''}
                ${selectedRecommendationId ? `<span class="pill">recommendation=${selectedRecommendationId}</span>` : ''}
              </div>
            </div>
            <div class="graph-legend">
              <span class="graph-legend-item"><span class="graph-swatch center"></span>center</span>
              <span class="graph-legend-item"><span class="graph-swatch related"></span>related</span>
              <span class="graph-legend-item"><span class="graph-swatch metric"></span>metric</span>
              <span class="graph-legend-item"><span class="graph-swatch pair"></span>pair</span>
              <span class="graph-legend-item"><span class="graph-swatch recommendation"></span>recommendation</span>
            </div>
          </div>
          <div class="graph-grid">
            ${nodes.map(node => renderNeighborhoodNode(node)).join('')}
          </div>
        </div>
      `;
    }

    function inferCenterSkill(context) {
      const { riskRows = [], skillRows = [], actionCards = [], recommendationRows = [], conflictRows = [] } = context;
      if (selectedPair?.left_skill_id) return selectedPair.left_skill_id;
      if (selectedRecommendationId) {
        const recommendation = recommendationRows.find(item => item.id === selectedRecommendationId);
        if (recommendation?.skill_ids?.length) return recommendation.skill_ids[0];
      }
      if (selectedActionId) {
        const action = actionCards.find(item => item.action_id === selectedActionId);
        if (action?.target_skill_ids?.length) return action.target_skill_ids[0];
        if (action?.changed_skill_ids?.length) return action.changed_skill_ids[0];
      }
      return riskRows[0]?.skill_id || skillRows[0]?.skill_id || conflictRows[0]?.left_skill_id || '';
    }

    function buildNeighborhoodNodes(context) {
      const {
        centerSkillId,
        riskRows,
        conflictRows,
        recommendationRows,
        skillRows,
        actionCards,
        metricCards,
      } = context;
      const nodes = [];
      if (centerSkillId) {
        const risk = riskRows.find(item => item.skill_id === centerSkillId);
        const skillDelta = skillRows.find(item => item.skill_id === centerSkillId);
        nodes.push({
          type: 'center',
          title: centerSkillId,
          subtitle: risk?.family || (skillDelta?.changed ? 'changed skill' : 'focused skill'),
          pills: buildNeighborhoodPills({ risk, skillDelta }),
          links: buildCenterLinks({ centerSkillId, conflictRows, recommendationRows, actionCards }),
          clickTarget: { kind: 'skill', value: centerSkillId },
          active: selectedSkillId === centerSkillId,
        });
      }

      const relatedSkills = collectRelatedSkills({ centerSkillId, conflictRows, recommendationRows, actionCards, skillRows, riskRows });
      relatedSkills.forEach(skillId => {
        const risk = riskRows.find(item => item.skill_id === skillId);
        const skillDelta = skillRows.find(item => item.skill_id === skillId);
        nodes.push({
          type: 'related',
          title: skillId,
          subtitle: risk?.family || (skillDelta?.status || 'related skill'),
          pills: buildNeighborhoodPills({ risk, skillDelta }),
          links: buildRelatedLinks({ skillId, centerSkillId, conflictRows, recommendationRows, actionCards }),
          clickTarget: { kind: 'skill', value: skillId },
          active: selectedSkillId === skillId,
        });
      });

      if (selectedPair?.left_skill_id && selectedPair?.right_skill_id) {
        nodes.push({
          type: 'pair',
          title: `${selectedPair.left_skill_id} ↔ ${selectedPair.right_skill_id}`,
          subtitle: 'focused pair',
          pills: ['pair', 'conflict focus'],
          links: conflictRows
            .filter(item =>
              (item.left_skill_id === selectedPair.left_skill_id && item.right_skill_id === selectedPair.right_skill_id) ||
              (item.left_skill_id === selectedPair.right_skill_id && item.right_skill_id === selectedPair.left_skill_id)
            )
            .slice(0, 2)
            .map(item => `overlap=${item.overlap_score}`),
          clickTarget: { kind: 'pair', value: `${selectedPair.left_skill_id}::${selectedPair.right_skill_id}` },
          active: true,
        });
      }

      if (selectedRecommendationId) {
        const recommendation = recommendationRows.find(item => item.id === selectedRecommendationId) || null;
        nodes.push({
          type: 'recommendation',
          title: selectedRecommendationId,
          subtitle: recommendation?.type || 'focused recommendation',
          pills: [
            recommendation?.priority ? `priority=${recommendation.priority}` : null,
            recommendation?.confidence ? `confidence=${recommendation.confidence}` : null,
          ].filter(Boolean),
          links: [
            ...(recommendation?.skill_ids || []).slice(0, 3).map(skillId => `skill ${skillId}`),
            recommendation?.mapped_action ? `action ${recommendation.mapped_action}` : null,
          ].filter(Boolean),
          clickTarget: { kind: 'recommendation', value: selectedRecommendationId },
          active: true,
        });
      }

      if (selectedMetric) {
        const metric = metricCards.find(item => item.metric === selectedMetric);
        nodes.push({
          type: 'metric',
          title: selectedMetric,
          subtitle: 'focused metric',
          pills: metric ? [`before=${metric.before}`, `after=${metric.after}`, `Δ ${signedNumber(metric.delta)}`, directionLabel(metric.direction)] : [],
          links: actionCards
            .filter(item => Object.prototype.hasOwnProperty.call(item.metric_impacts || {}, selectedMetric))
            .slice(0, 4)
            .map(item => `action ${item.action_id}`),
          clickTarget: { kind: 'metric', value: selectedMetric },
          active: Boolean(selectedMetric),
        });
      }

      if (!nodes.length) {
        nodes.push({
          type: 'related',
          title: 'No focus yet',
          subtitle: 'Select a skill, pair, recommendation, metric, or action',
          pills: [],
          links: [],
          clickTarget: null,
          active: false,
        });
      }
      return nodes.slice(0, 6);
    }

    function buildNeighborhoodPills(context) {
      const { risk, skillDelta } = context;
      const pills = [];
      if (risk?.rewrite_priority != null) pills.push(`rewrite=${risk.rewrite_priority}`);
      if (risk?.black_hole_risk != null) pills.push(`black_hole=${risk.black_hole_risk}`);
      if (skillDelta?.status) pills.push(`status=${skillDelta.status}`);
      if (skillDelta?.changed) pills.push('changed');
      return pills.slice(0, 4);
    }

    function buildCenterLinks(context) {
      const { centerSkillId, conflictRows, recommendationRows, actionCards } = context;
      const links = [];
      conflictRows.filter(item => item.left_skill_id === centerSkillId || item.right_skill_id === centerSkillId).slice(0, 3).forEach(item => {
        const other = item.left_skill_id === centerSkillId ? item.right_skill_id : item.left_skill_id;
        links.push(`conflict with ${other}`);
      });
      recommendationRows.filter(item => (item.skill_ids || []).includes(centerSkillId)).slice(0, 2).forEach(item => {
        links.push(`recommendation ${item.id}`);
      });
      actionCards.filter(item => (item.target_skill_ids || []).includes(centerSkillId) || (item.changed_skill_ids || []).includes(centerSkillId)).slice(0, 2).forEach(item => {
        links.push(`action ${item.action_id}`);
      });
      return links;
    }

    function buildRelatedLinks(context) {
      const { skillId, centerSkillId, conflictRows, recommendationRows, actionCards } = context;
      const links = [];
      if (centerSkillId) links.push(`connected to ${centerSkillId}`);
      conflictRows.filter(item => [item.left_skill_id, item.right_skill_id].includes(skillId)).slice(0, 2).forEach(item => {
        links.push(`overlap=${item.overlap_score}`);
      });
      recommendationRows.filter(item => (item.skill_ids || []).includes(skillId)).slice(0, 1).forEach(item => {
        links.push(`recommendation ${item.id}`);
      });
      actionCards.filter(item => (item.target_skill_ids || []).includes(skillId) || (item.changed_skill_ids || []).includes(skillId)).slice(0, 1).forEach(item => {
        links.push(`action ${item.action_id}`);
      });
      return links;
    }

    function collectRelatedSkills(context) {
      const { centerSkillId, conflictRows, recommendationRows, actionCards, skillRows, riskRows } = context;
      const ids = new Set();
      if (selectedPair) {
        ids.add(selectedPair.left_skill_id);
        ids.add(selectedPair.right_skill_id);
      }
      conflictRows.forEach(item => {
        if (!centerSkillId || item.left_skill_id === centerSkillId || item.right_skill_id === centerSkillId) {
          ids.add(item.left_skill_id);
          ids.add(item.right_skill_id);
        }
      });
      recommendationRows.forEach(item => {
        if (!centerSkillId || (item.skill_ids || []).includes(centerSkillId)) {
          (item.skill_ids || []).forEach(skillId => ids.add(skillId));
        }
      });
      actionCards.forEach(item => {
        [...(item.target_skill_ids || []), ...(item.changed_skill_ids || [])].forEach(skillId => ids.add(skillId));
      });
      skillRows.slice(0, 4).forEach(item => ids.add(item.skill_id));
      riskRows.slice(0, 4).forEach(item => ids.add(item.skill_id));
      if (centerSkillId) ids.delete(centerSkillId);
      return [...ids].slice(0, 4);
    }

    function renderNeighborhoodNode(node) {
      const onClick = node.clickTarget ? ` onclick="activateNeighborhoodNode('${node.clickTarget.kind}', '${node.clickTarget.value}')"` : '';
      return `
        <div class="graph-node ${node.type === 'center' ? 'center' : node.type === 'metric' ? 'metric' : node.type === 'pair' ? 'pair' : node.type === 'recommendation' ? 'recommendation' : 'related'} ${node.active ? 'active' : ''}"${onClick}>
          <div class="graph-node-header">
            <div>
              <strong>${node.title}</strong>
              <div class="muted" style="margin-top:6px;">${node.subtitle || ''}</div>
            </div>
            ${node.clickTarget?.kind === 'skill' && node.title ? `<button class="action-link" type="button" onclick="event.stopPropagation(); selectSkill('${node.title}')">Focus</button>` : node.clickTarget?.kind === 'metric' ? `<button class="action-link" type="button" onclick="event.stopPropagation(); selectMetric('${node.title}')">Focus</button>` : node.clickTarget?.kind === 'pair' ? `<button class="action-link" type="button" onclick="event.stopPropagation(); activateNeighborhoodNode('pair', '${node.clickTarget.value}')">Focus</button>` : node.clickTarget?.kind === 'recommendation' ? `<button class="action-link" type="button" onclick="event.stopPropagation(); activateNeighborhoodNode('recommendation', '${node.clickTarget.value}')">Focus</button>` : ''}
          </div>
          <div class="pill-row">
            ${node.pills.map(item => `<span class="pill">${item}</span>`).join('') || '<span class="graph-empty">No metrics.</span>'}
          </div>
          <div class="graph-links">
            ${node.links.map(item => `<span class="graph-link">${item}</span>`).join('') || '<span class="graph-empty">No visible edges.</span>'}
          </div>
        </div>
      `;
    }

    function activateNeighborhoodNode(kind, value) {
      if (!value) return;
      if (kind === 'skill') {
        selectSkill(value);
        return;
      }
      if (kind === 'metric') {
        selectMetric(value);
        return;
      }
      if (kind === 'pair') {
        const [leftSkillId, rightSkillId] = String(value).split('::');
        if (leftSkillId && rightSkillId) selectPair(leftSkillId, rightSkillId);
        return;
      }
      if (kind === 'recommendation') {
        selectRecommendation(value);
      }
    }

    function renderActionImpactCards(items, context = {}) {
      const { relatedMetricSet = new Set(), focusSkillSet = new Set() } = context;
      if (!items.length) return '<p class="muted">No action impact details.</p>';
      return items.map(item => {
        const metricNames = Object.keys(item.metric_impacts || {});
        const isActive = selectedActionId === item.action_id;
        const matchesMetric = selectedMetric && metricNames.includes(selectedMetric);
        const matchesFocusedActionMetric = !selectedMetric && relatedMetricSet.size
          ? metricNames.some(metric => relatedMetricSet.has(metric))
          : false;
        const matchesSkill = selectedSkillId
          ? (item.changed_skill_ids || []).includes(selectedSkillId) || (item.target_skill_ids || []).includes(selectedSkillId)
          : focusSkillSet.size
            ? [...(item.changed_skill_ids || []), ...(item.target_skill_ids || [])].some(skillId => focusSkillSet.has(skillId))
            : false;
        const isRelated = matchesMetric || matchesFocusedActionMetric || matchesSkill;
        const isFiltered = (selectedMetric || selectedSkillId || selectedActionId) && !isActive && !isRelated;
        return `
          <div class="queue-card action-impact-card ${isActive ? 'active-row' : ''} ${isRelated ? 'related-row' : ''} ${isFiltered ? 'filtered-row' : ''}" onclick="selectAction('${item.action_id}')">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">
              <div>
                <strong>${item.action_id}</strong>
                <div class="muted" style="margin-top:6px;">${actionKindLabel(item)} · status=${item.status}</div>
              </div>
              <span class="delta-chip ${item.status === 'applied' ? 'positive' : 'neutral'}">${item.status}</span>
            </div>
            <div class="pill-row">
              ${item.action_subtype ? `<span class="pill">intent=${item.action_subtype}</span>` : ''}
              ${(item.target_skill_ids || []).map(skillId => `<span class="pill">target=${skillId}</span>`).join('') || '<span class="muted">No targets.</span>'}
            </div>
            <div class="pill-row">
              ${(item.changed_skill_ids || []).map(skillId => `<span class="pill">changed=${skillId}</span>`).join('') || '<span class="muted">No changed skills.</span>'}
            </div>
            <div class="pill-row">
              ${metricNames.map(metric => {
                const metricImpact = item.metric_impacts[metric] || {};
                return `<span class="pill">${metric}=${signedNumber(metricImpact.delta)}</span>`;
              }).join('') || '<span class="muted">No metric impacts.</span>'}
            </div>
            ${item.notes ? `<div class="muted" style="margin-top:8px;">${item.notes}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    function hydrateRecommendationRows(items) {
      return (items || []).map(item => {
        const state = recommendationDecisions[item.id] || {};
        return {
          ...item,
          decision_status: state.status || null,
          decision_updated_at: state.updated_at || null,
        };
      });
    }

    function summarizeRecommendationDecisions(items) {
      return (items || []).reduce((summary, item) => {
        summary.total += 1;
        if (item.decision_status === 'accepted') summary.accepted += 1;
        if (item.decision_status === 'dismissed') summary.dismissed += 1;
        if (item.decision_status === 'needs_review') summary.needs_review += 1;
        return summary;
      }, { total: 0, accepted: 0, dismissed: 0, needs_review: 0 });
    }

    function renderOperationsPanel(items, summary) {
      if (!items.length) return '';
      const actionableItems = items.filter(item => !selectedDecisionFilter || item.decision_status === selectedDecisionFilter);
      const topPending = actionableItems.filter(item => !item.decision_status).slice(0, 3);
      const topReview = actionableItems.filter(item => item.decision_status === 'needs_review').slice(0, 3);
      return `
        <div class="section operations-panel ${shareModeSectionClass(false, shareMode && !selectedRecommendationId)}">
          <h2>Operations Panel</h2>
          <div class="operations-grid">
            <div>
              <div class="muted">Move from review to action without leaving the viewer.</div>
              <div class="pill-row">
                ${selectedDecisionFilter ? `<span class="pill">decision_filter=${decisionLabel(selectedDecisionFilter)}</span>` : '<span class="pill">decision_filter=all</span>'}
                <span class="pill">visible=${actionableItems.length}</span>
                <span class="pill">accepted=${summary.accepted}</span>
                <span class="pill">dismissed=${summary.dismissed}</span>
                <span class="pill">needs_review=${summary.needs_review}</span>
              </div>
              <div class="operations-actions">
                <button class="action-link" type="button" onclick="applyDecisionToVisible('needs_review')">Mark visible as needs review</button>
                <button class="action-link" type="button" onclick="applyDecisionToVisible('accepted')">Accept visible</button>
                <button class="action-link" type="button" onclick="clearVisibleDecisions()">Clear visible decisions</button>
                ${selectedDecisionFilter ? '<button class="action-link" type="button" onclick="setDecisionFilter(\'\')">Clear decision filter</button>' : ''}
              </div>
            </div>
            <div>
              <div class="stat-label">Next review queue</div>
              <div class="operations-list">
                ${topPending.map(item => `
                  <div class="operations-item">
                    <strong>${item.id}</strong>
                    <div class="muted">${item.summary}</div>
                    <div class="pill-row">
                      <button class="action-link" type="button" onclick="selectRecommendation('${item.id}')">Focus</button>
                      <button class="action-link" type="button" onclick="setRecommendationDecision('${item.id}', 'needs_review')">Needs review</button>
                    </div>
                  </div>
                `).join('') || '<div class="operations-item"><strong>No unreviewed recommendations.</strong><div class="muted">Visible recommendations are already classified.</div></div>'}
                ${topReview.map(item => `
                  <div class="operations-item">
                    <strong>${item.id}</strong>
                    <div class="muted">ready for operator follow-up</div>
                    <div class="pill-row">
                      <button class="action-link" type="button" onclick="selectRecommendation('${item.id}')">Focus</button>
                      <button class="action-link" type="button" onclick="setRecommendationDecision('${item.id}', 'accepted')">Accept</button>
                      <button class="action-link" type="button" onclick="setRecommendationDecision('${item.id}', 'dismissed')">Dismiss</button>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function setDecisionFilter(status) {
      selectedDecisionFilter = selectedDecisionFilter === status ? '' : status;
      syncHashState();
      if (currentReport) renderReport(currentReport);
    }

    function applyDecisionToVisible(status) {
      const visibleItems = filterRecommendationQueue(hydrateRecommendationRows(currentReport?.views?.recommendation_queue || []));
      visibleItems.forEach(item => {
        recommendationDecisions[item.id] = {
          status,
          updated_at: new Date().toISOString(),
        };
      });
      syncHashState();
      if (currentReport) renderReport(currentReport);
    }

    function clearVisibleDecisions() {
      const visibleItems = filterRecommendationQueue(hydrateRecommendationRows(currentReport?.views?.recommendation_queue || []));
      visibleItems.forEach(item => {
        delete recommendationDecisions[item.id];
      });
      syncHashState();
      if (currentReport) renderReport(currentReport);
    }

    function decisionLabel(status) {
      if (status === 'accepted') return 'accepted';
      if (status === 'dismissed') return 'dismissed';
      if (status === 'needs_review') return 'needs review';
      return 'unreviewed';
    }

    function renderDecisionBadge(status) {
      if (!status) return '<span class="delta-chip neutral">unreviewed</span>';
      return `<span class="decision-badge ${status}">${decisionLabel(status)}</span>`;
    }

    function renderDecisionControls(item) {
      const currentStatus = item?.decision_status || null;
      return `
        <div class="decision-controls" onclick="event.stopPropagation()">
          ${['accepted', 'dismissed', 'needs_review'].map(status => `
            <button class="decision-button ${currentStatus === status ? `active ${status}` : ''}" type="button" onclick="setRecommendationDecision('${item.id}', '${status}')">${decisionLabel(status)}</button>
          `).join('')}
          ${currentStatus ? `<button class="decision-button" type="button" onclick="clearRecommendationDecision('${item.id}')">clear</button>` : ''}
        </div>
      `;
    }

    function setRecommendationDecision(recommendationId, status) {
      recommendationDecisions[recommendationId] = {
        status,
        updated_at: new Date().toISOString(),
      };
      syncHashState();
      if (currentReport) renderReport(currentReport);
    }

    function clearRecommendationDecision(recommendationId) {
      delete recommendationDecisions[recommendationId];
      syncHashState();
      if (currentReport) renderReport(currentReport);
    }

    function buildDecisionExportMap(items) {
      const decisions = {};
      (items || []).forEach(item => {
        if (!item.id || !item.decision_status) return;
        decisions[item.id] = {
          status: item.decision_status,
          updated_at: item.decision_updated_at || null,
        };
      });
      return decisions;
    }

    function applyDecisionStateToReport(report) {
      if (!report) return report;
      const recommendationQueue = hydrateRecommendationRows(report.views?.recommendation_queue || []);
      return {
        ...report,
        views: {
          ...(report.views || {}),
          recommendation_queue: recommendationQueue,
        },
      };
    }

    function restoreRecommendationDecisions(report) {
      const queue = report?.views?.recommendation_queue || [];
      const nextState = {};
      queue.forEach(item => {
        if (!item.id || !item.decision_status) return;
        nextState[item.id] = {
          status: item.decision_status,
          updated_at: item.decision_updated_at || null,
        };
      });
      recommendationDecisions = nextState;
    }

    function renderOptimizationSkillTable(rows, focusSkillSet, skillActionMap) {
      if (!rows.length) return '<p class="muted">No skill deltas available.</p>';
      return `
        <table>
          <thead>
            <tr>
              <th>Skill</th>
              <th>Changed</th>
              <th>Competition Δ</th>
              <th>Anchor Δ</th>
              <th>Black Hole Δ</th>
              <th>Rewrite Δ</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(row => {
              const relatedActions = skillActionMap.get(row.skill_id) || [];
              const isExpanded = selectedSkillId === row.skill_id || focusSkillSet.has(row.skill_id);
              return `
                <tr class="clickable-row ${row.changed ? 'changed-row' : ''} ${isExpanded ? 'active-row' : ''}" onclick="selectSkillDelta('${row.skill_id}')">
                  <td><strong>${row.skill_id}</strong></td>
                  <td><span class="delta-chip ${row.changed ? 'positive' : 'neutral'}">${row.changed ? 'changed' : 'stable'}</span></td>
                  <td class="${deltaTextClass(row.competition_score_delta)}">${signedNumber(row.competition_score_delta)}</td>
                  <td class="${deltaTextClass(row.anchor_strength_delta)}">${signedNumber(row.anchor_strength_delta)}</td>
                  <td class="${deltaTextClass(row.black_hole_risk_delta)}">${signedNumber(row.black_hole_risk_delta)}</td>
                  <td class="${deltaTextClass(row.rewrite_priority_delta)}">${signedNumber(row.rewrite_priority_delta)}</td>
                </tr>
                ${isExpanded ? `
                  <tr class="skill-detail-row">
                    <td colspan="6">
                      <div class="skill-detail-card">
                        <div class="skill-detail-grid">
                          <div>
                            <div class="stat-label">Why this skill changed</div>
                            <div class="focus-note">${buildSkillDeltaNarrative(row, relatedActions)}</div>
                          </div>
                          <div>
                            <div class="stat-label">Related actions</div>
                            <div class="pill-row">
                              ${relatedActions.map(action => `<button class="action-link" type="button" onclick="event.stopPropagation(); selectAction('${action.action_id}')">${action.action_id}</button>`).join('') || '<span class="muted">No related actions.</span>'}
                            </div>
                          </div>
                          <div>
                            <div class="stat-label">Metric shifts</div>
                            <div class="pill-row">
                              ${buildSkillDeltaMetricPills(row)}
                            </div>
                          </div>
                        </div>
                      </div>
                    </td>
                  </tr>
                ` : ''}
              `;
            }).join('')}
          </tbody>
        </table>
      `;
    }

    function buildMetricContextMap(actions, rows) {
      const skillRowsById = new Map((rows || []).map(row => [row.skill_id, row]));
      const map = new Map();
      (actions || []).forEach(action => {
        Object.keys(action.metric_impacts || {}).forEach(metric => {
          if (!map.has(metric)) map.set(metric, { actions: [], skills: [] });
          const entry = map.get(metric);
          if (!entry.actions.some(item => item.action_id === action.action_id)) {
            entry.actions.push(action);
          }
          [...(action.changed_skill_ids || []), ...(action.target_skill_ids || [])].forEach(skillId => {
            const row = skillRowsById.get(skillId);
            if (row && !entry.skills.some(item => item.skill_id === skillId)) {
              entry.skills.push(row);
            }
          });
        });
      });
      return map;
    }

    function renderMetricDetailCard(metricCard, context) {
      const actions = context.actions || [];
      const skills = context.skills || [];
      return `
        <div class="metric-detail-card" onclick="event.stopPropagation()">
          <div class="skill-detail-grid">
            <div>
              <div class="stat-label">Why this metric moved</div>
              <div class="focus-note">${buildMetricNarrative(metricCard, actions, skills)}</div>
            </div>
            <div>
              <div class="stat-label">Related actions</div>
              <div class="pill-row">
                ${actions.map(action => `<button class="action-link" type="button" onclick="selectAction('${action.action_id}')">${action.action_id}</button>`).join('') || '<span class="muted">No related actions.</span>'}
              </div>
            </div>
            <div>
              <div class="stat-label">Affected skills</div>
              <div class="pill-row">
                ${skills.map(skill => `<button class="action-link" type="button" onclick="selectSkillDelta('${skill.skill_id}')">${skill.skill_id}</button>`).join('') || '<span class="muted">No visible skills.</span>'}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function buildMetricNarrative(metricCard, actions, skills) {
      if (!actions.length && !skills.length) {
        return `Metric ${metricCard.metric} moved by ${signedNumber(metricCard.delta)} without a visible action-to-skill chain in the current filtered view.`;
      }
      const actionText = actions.length ? `${actions.length} related actions` : 'no mapped actions';
      const skillText = skills.length ? `${skills.length} visible skills` : 'no visible skills';
      return `Metric ${metricCard.metric} is ${directionLabel(metricCard.direction).toLowerCase()} by ${signedNumber(metricCard.delta)}, currently explained by ${actionText} and ${skillText}.`;
    }

    function buildSkillActionMap(actions) {
      const map = new Map();
      (actions || []).forEach(action => {
        const skillIds = [...(action.target_skill_ids || []), ...(action.changed_skill_ids || [])];
        skillIds.forEach(skillId => {
          if (!map.has(skillId)) map.set(skillId, []);
          const existing = map.get(skillId);
          if (!existing.some(item => item.action_id === action.action_id)) {
            existing.push(action);
          }
        });
      });
      return map;
    }

    function buildSkillDeltaNarrative(row, relatedActions) {
      if (!row.changed) {
        return `Skill ${row.skill_id} stayed stable, with only small metric movement across the optimization pass.`;
      }
      if (relatedActions.length) {
        return `Skill ${row.skill_id} moved because ${relatedActions.map(action => action.action_id).join(', ')} targeted or changed it, shifting competition ${signedNumber(row.competition_score_delta)}, anchor ${signedNumber(row.anchor_strength_delta)}, black-hole ${signedNumber(row.black_hole_risk_delta)}, and rewrite ${signedNumber(row.rewrite_priority_delta)}.`;
      }
      return `Skill ${row.skill_id} changed in the scorecard even though no explicit related action was mapped in the current report.`;
    }

    function buildSkillDeltaMetricPills(row) {
      return [
        ['competition', row.competition_score_delta],
        ['anchor', row.anchor_strength_delta],
        ['black_hole', row.black_hole_risk_delta],
        ['rewrite', row.rewrite_priority_delta],
      ].map(([label, value]) => `<span class="pill">${label}=${signedNumber(value)}</span>`).join('');
    }

    function buildOptimizationFocusNarrative(context) {
      const {
        selectedMetricCard,
        focusedAction,
        selectedSkillId,
        relatedActionCount,
        visibleSkillCount,
        relatedMetricCount,
      } = context;
      if (selectedMetricCard && focusedAction && selectedSkillId) {
        return `Metric ${selectedMetricCard.metric} narrows to ${actionKindLabel(focusedAction)} action ${focusedAction.action_id}, which currently focuses skill ${selectedSkillId}.`;
      }
      if (selectedMetricCard && focusedAction) {
        return `Metric ${selectedMetricCard.metric} is linked to ${actionKindLabel(focusedAction)} action ${focusedAction.action_id} across ${visibleSkillCount} visible skills.`;
      }
      if (focusedAction && selectedSkillId) {
        return `${actionKindLabel(focusedAction)} action ${focusedAction.action_id} is centered on skill ${selectedSkillId} and highlights ${relatedMetricCount || 0} related metrics.`;
      }
      if (selectedMetricCard) {
        return `Metric ${selectedMetricCard.metric} currently filters the action chain to ${relatedActionCount} related actions.`;
      }
      if (focusedAction) {
        return `${actionKindLabel(focusedAction)} action ${focusedAction.action_id} currently highlights ${visibleSkillCount} visible skills and ${relatedMetricCount || 0} linked metrics.`;
      }
      if (selectedSkillId) {
        return `Skill ${selectedSkillId} currently narrows the action chain to ${relatedActionCount} related actions.`;
      }
      return 'Click a metric, action, or skill to trace the optimization path.';
    }

    function metricCardClass(direction) {
      if (direction === 'improved') return 'delta-positive';
      if (direction === 'degraded') return 'delta-negative';
      return 'delta-neutral';
    }

    function deltaTone(direction) {
      if (direction === 'improved') return 'positive';
      if (direction === 'degraded') return 'negative';
      return 'neutral';
    }

    function directionLabel(direction) {
      if (direction === 'improved') return 'Improved';
      if (direction === 'degraded') return 'Degraded';
      return 'Neutral';
    }

    function signedNumber(value) {
      const number = Number(value ?? 0);
      if (number > 0) return `+${number}`;
      return `${number}`;
    }

    function actionKindLabel(action) {
      if (!action) return 'action';
      return action.action_subtype
        ? `${action.action_type}/${action.action_subtype}`
        : `${action.action_type}`;
    }

    function deltaTextClass(value) {
      const number = Number(value ?? 0);
      if (number > 0) return 'delta-text-positive';
      if (number < 0) return 'delta-text-negative';
      return 'delta-text-neutral';
    }

    function renderActionList(items, allActionImpactCards, groupLabel, emptyMessage) {
      if (!items.length) return `<p class="muted">${emptyMessage}</p>`;
      return items.map(actionId => {
        const action = (allActionImpactCards || []).find(item => item.action_id === actionId) || null;
        const metricNames = Object.keys(action?.metric_impacts || {});
        const isActive = selectedActionId === actionId;
        const matchesMetric = selectedMetric && metricNames.includes(selectedMetric);
        const matchesSkill = selectedSkillId
          ? (action?.changed_skill_ids || []).includes(selectedSkillId) || (action?.target_skill_ids || []).includes(selectedSkillId)
          : false;
        const isRelated = matchesMetric || matchesSkill;
        const isFiltered = (selectedMetric || selectedSkillId || selectedActionId) && !isActive && !isRelated;
        return `
          <div class="queue-card action-list-card ${isActive ? 'active-row' : ''} ${isRelated ? 'related-row' : ''} ${isFiltered ? 'filtered-row' : ''}" onclick="selectAction('${actionId}')">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">
              <div>
                <strong>${actionId}</strong>
                <div class="muted" style="margin-top:6px;">${action ? `${actionKindLabel(action)} · ${action.status}` : `${groupLabel} action`}</div>
              </div>
              <span class="delta-chip ${groupLabel === 'applied' ? 'positive' : 'neutral'}">${groupLabel}</span>
            </div>
            ${action ? `
              <div class="pill-row">
                ${action.action_subtype ? `<span class="pill">intent=${action.action_subtype}</span>` : ''}
                ${(action.target_skill_ids || []).map(skillId => `<span class="pill">target=${skillId}</span>`).join('') || '<span class="muted">No targets.</span>'}
              </div>
              <div class="pill-row">
                ${metricNames.map(metric => `<span class="pill">metric=${metric}</span>`).join('') || '<span class="muted">No metrics.</span>'}
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }

    function exportCurrentView() {
      if (!currentReport) return;
      if (currentReport.report_type === 'skill_manager_optimization') {
        exportOptimizationSnapshot(currentReport);
        return;
      }
      const reportWithDecisions = applyDecisionStateToReport(currentReport);
      const allRiskRows = reportWithDecisions.views?.risk_table || [];
      const allConflictRows = reportWithDecisions.views?.conflict_queue || [];
      const allRecommendationRows = reportWithDecisions.views?.recommendation_queue || [];
      const exported = {
        report_type: reportWithDecisions.report_type,
        exported_at: new Date().toISOString(),
        state: {
          filter: skillFilterInput.value.trim(),
          sort: sortBySelect.value,
          selected_skill_id: selectedSkillId || null,
          selected_pair: selectedPair,
          recommendation_decisions: buildDecisionExportMap(allRecommendationRows),
        },
        highlights: reportWithDecisions.highlights || {},
        library: reportWithDecisions.sections?.library || reportWithDecisions.library_scorecard || {},
        views: {
          risk_table: filterAndSortRiskTable(allRiskRows),
          conflict_queue: filterConflictQueue(allConflictRows),
          recommendation_queue: filterRecommendationQueue(allRecommendationRows),
        },
        details: {
          skill: selectedSkillId
            ? allRiskRows.find(row => row.skill_id === selectedSkillId) || null
            : null,
          pair: selectedPair,
        },
      };
      downloadJson(exported, 'auto-skill-manager-view.json');
    }

    function exportOptimizationSnapshot(report) {
      const allActionImpactCards = report.views?.action_impact_cards || [];
      const metricCards = report.views?.metric_delta_cards || [];
      const activeFilter = skillFilterInput.value.trim().toLowerCase();
      const metricFocusedActions = selectedMetric
        ? allActionImpactCards.filter(item => Object.prototype.hasOwnProperty.call(item.metric_impacts || {}, selectedMetric))
        : allActionImpactCards;
      const skillFocusedActions = selectedSkillId
        ? metricFocusedActions.filter(item => (item.changed_skill_ids || []).includes(selectedSkillId) || (item.target_skill_ids || []).includes(selectedSkillId))
        : metricFocusedActions;
      const visibleActionCards = selectedActionId
        ? skillFocusedActions.filter(item => item.action_id === selectedActionId)
        : skillFocusedActions;
      const focusedAction = selectedActionId
        ? allActionImpactCards.find(item => item.action_id === selectedActionId) || null
        : null;
      const relatedMetricSet = new Set(
        focusedAction
          ? Object.keys(focusedAction.metric_impacts || {})
          : []
      );
      const focusSkillSet = new Set(
        focusedAction
          ? [...(focusedAction.changed_skill_ids || []), ...(focusedAction.target_skill_ids || [])]
          : selectedSkillId
            ? [selectedSkillId]
            : []
      );
      const visibleSkillRows = (report.views?.skill_delta_table || []).filter(row => {
        if (focusSkillSet.size && !focusSkillSet.has(row.skill_id)) return false;
        if (!activeFilter) return true;
        return String(row.skill_id || '').toLowerCase().includes(activeFilter);
      }).sort((left, right) => Number(right.rewrite_priority_after ?? 0) - Number(left.rewrite_priority_after ?? 0));
      const metricContextMap = buildMetricContextMap(allActionImpactCards, visibleSkillRows);
      const skillActionMap = buildSkillActionMap(allActionImpactCards);
      const selectedMetricCard = selectedMetric
        ? metricCards.find(item => item.metric === selectedMetric) || null
        : null;
      const selectedSkillRow = selectedSkillId
        ? visibleSkillRows.find(row => row.skill_id === selectedSkillId) || null
        : null;
      const selectedSkillActions = selectedSkillRow
        ? skillActionMap.get(selectedSkillRow.skill_id) || []
        : [];
      const metricContext = selectedMetricCard
        ? metricContextMap.get(selectedMetricCard.metric) || { actions: [], skills: [] }
        : { actions: [], skills: [] };
      const focusNarrative = buildOptimizationFocusNarrative({
        selectedMetricCard,
        focusedAction,
        selectedSkillId,
        relatedActionCount: visibleActionCards.length,
        visibleSkillCount: visibleSkillRows.length,
        relatedMetricCount: relatedMetricSet.size,
      });
      const snapshot = {
        report_type: report.report_type,
        exported_at: new Date().toISOString(),
        export_type: 'optimization_focus_snapshot',
        report_metadata: {
          highlights: report.highlights || {},
          scorecard_before: report.sections?.scorecard_before || {},
          scorecard_after: report.sections?.scorecard_after || {},
        },
        state: {
          filter: skillFilterInput.value.trim(),
          sort: sortBySelect.value,
          selected_metric: selectedMetric || null,
          selected_action_id: selectedActionId || null,
          selected_skill_id: selectedSkillId || null,
        },
        focus: {
          narrative: focusNarrative,
          selected_metric_card: selectedMetricCard,
          selected_action: focusedAction,
          selected_skill_row: selectedSkillRow,
          selected_metric_explanation: selectedMetricCard
            ? buildMetricNarrative(selectedMetricCard, metricContext.actions || [], metricContext.skills || [])
            : null,
          selected_skill_explanation: selectedSkillRow
            ? buildSkillDeltaNarrative(selectedSkillRow, selectedSkillActions)
            : null,
        },
        visible_entities: {
          metrics: metricCards,
          action_cards: visibleActionCards,
          skill_rows: visibleSkillRows,
        },
        related_entities: {
          metric_actions: metricContext.actions || [],
          metric_skills: metricContext.skills || [],
          skill_actions: selectedSkillActions,
        },
      };
      downloadJson(snapshot, 'auto-skill-manager-optimization-snapshot.json');
    }

    function downloadJson(payload, filename) {
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function effectiveSkillQuery() {
      return (selectedSkillId || skillFilterInput.value.trim()).toLowerCase();
    }

    function clearSelections() {
      selectedSkillId = '';
      selectedPair = null;
      selectedActionId = '';
      selectedMetric = '';
      selectedRecommendationId = '';
      selectedDecisionFilter = '';
      syncHashState();
      if (currentReport) renderReport(currentReport);
    }

    function clearSelectedSkill() {
      selectedSkillId = '';
      syncHashState();
      if (currentReport) renderReport(currentReport);
    }

    function clearSelectedAction() {
      selectedActionId = '';
      syncHashState();
      if (currentReport) renderReport(currentReport);
    }

    function clearSelectedMetric() {
      selectedMetric = '';
      selectedActionId = '';
      syncHashState();
      if (currentReport) renderReport(currentReport);
    }

    function selectSkill(skillId) {
      selectedSkillId = skillId || '';
      selectedPair = null;
      selectedActionId = '';
      selectedMetric = '';
      selectedRecommendationId = '';
      syncHashState();
      if (currentReport) renderReport(currentReport);
    }

    function selectSkillDelta(skillId) {
      selectedSkillId = selectedSkillId === skillId ? '' : skillId;
      selectedActionId = '';
      selectedPair = null;
      syncHashState();
      if (currentReport) renderReport(currentReport);
    }

    function selectAction(actionId) {
      selectedActionId = selectedActionId === actionId ? '' : actionId;
      selectedSkillId = '';
      selectedPair = null;
      syncHashState();
      if (currentReport) renderReport(currentReport);
    }

    function selectMetric(metric) {
      selectedMetric = selectedMetric === metric ? '' : metric;
      selectedActionId = '';
      selectedSkillId = '';
      selectedPair = null;
      syncHashState();
      if (currentReport) renderReport(currentReport);
    }

    function selectPair(leftSkillId, rightSkillId) {
      selectedPair = { left_skill_id: leftSkillId, right_skill_id: rightSkillId };
      selectedSkillId = '';
      selectedActionId = '';
      selectedMetric = '';
      selectedRecommendationId = '';
      syncHashState();
      if (currentReport) renderReport(currentReport);
    }

    function selectRecommendation(recommendationId) {
      selectedRecommendationId = selectedRecommendationId === recommendationId ? '' : recommendationId;
      selectedSkillId = '';
      selectedPair = null;
      selectedActionId = '';
      selectedMetric = '';
      syncHashState();
      if (currentReport) renderReport(currentReport);
    }

    function filterAndSortRiskTable(rows, recommendationSkillSet = new Set()) {
      const query = effectiveSkillQuery();
      const pairSkills = selectedPair ? [selectedPair.left_skill_id, selectedPair.right_skill_id] : null;
      const sortBy = sortBySelect.value;
      return [...rows]
        .filter(row => {
          if (recommendationSkillSet.size) return recommendationSkillSet.has(row.skill_id);
          if (pairSkills) return pairSkills.includes(row.skill_id);
          if (!query) return true;
          return [row.skill_id, row.family].filter(Boolean).some(value => String(value).toLowerCase().includes(query));
        })
        .sort((left, right) => Number(right?.[sortBy] ?? 0) - Number(left?.[sortBy] ?? 0));
    }

    function filterConflictQueue(items, recommendationSkillSet = new Set()) {
      const query = effectiveSkillQuery();
      if (selectedPair) {
        return items.filter(item =>
          item.left_skill_id === selectedPair.left_skill_id && item.right_skill_id === selectedPair.right_skill_id ||
          item.left_skill_id === selectedPair.right_skill_id && item.right_skill_id === selectedPair.left_skill_id
        );
      }
      if (recommendationSkillSet.size) {
        return items.filter(item => recommendationSkillSet.has(item.left_skill_id) || recommendationSkillSet.has(item.right_skill_id));
      }
      if (!query) return items;
      return items.filter(item =>
        [item.left_skill_id, item.right_skill_id].some(value => String(value).toLowerCase().includes(query))
      );
    }

    function filterRecommendationQueue(items) {
      const query = effectiveSkillQuery();
      let filtered = items;
      if (selectedRecommendationId) {
        filtered = filtered.filter(item => item.id === selectedRecommendationId);
      } else if (selectedPair) {
        const pairSkills = [selectedPair.left_skill_id, selectedPair.right_skill_id];
        filtered = filtered.filter(item => pairSkills.every(skillId => (item.skill_ids || []).includes(skillId)));
      } else if (query) {
        filtered = filtered.filter(item =>
          (item.skill_ids || []).some(value => String(value).toLowerCase().includes(query)) ||
          String(item.summary || '').toLowerCase().includes(query)
        );
      }
      if (selectedDecisionFilter) {
        filtered = filtered.filter(item => item.decision_status === selectedDecisionFilter);
      }
      return filtered;
    }

    function renderDetailsPanel(allRiskRows, allConflictRows, allRecommendationRows, selectedRecommendation) {
      if (selectedRecommendation) {
        const relatedSkills = allRiskRows.filter(row => (selectedRecommendation.skill_ids || []).includes(row.skill_id));
        const relatedConflicts = allConflictRows.filter(item =>
          [item.left_skill_id, item.right_skill_id].some(skillId => (selectedRecommendation.skill_ids || []).includes(skillId))
        );
        return `
          <div class="section">
            <h2>Focused Recommendation Details</h2>
            <div class="stats-grid">
              <div class="stat-card"><div class="stat-label">Recommendation</div><div class="stat-value">${selectedRecommendation.id}</div></div>
              <div class="stat-card"><div class="stat-label">Type</div><div class="stat-value">${selectedRecommendation.type}</div></div>
              <div class="stat-card"><div class="stat-label">Priority</div><div class="stat-value">${selectedRecommendation.priority}</div></div>
              <div class="stat-card"><div class="stat-label">Confidence</div><div class="stat-value">${selectedRecommendation.confidence}</div></div>
              <div class="stat-card"><div class="stat-label">Skills</div><div class="stat-value">${(selectedRecommendation.skill_ids || []).length}</div></div>
              <div class="stat-card"><div class="stat-label">Related Conflicts</div><div class="stat-value">${relatedConflicts.length}</div></div>
            </div>
            <div class="pill-row">
              ${renderDecisionBadge(selectedRecommendation.decision_status)}
              ${(selectedRecommendation.skill_ids || []).map(skillId => `<button class="action-link" type="button" onclick="selectSkill('${skillId}')">${skillId}</button>`).join('') || '<span class="muted">No linked skills.</span>'}
            </div>
            ${renderDecisionControls(selectedRecommendation)}
            <div class="focus-note">${selectedRecommendation.summary}</div>
            <div class="pill-row">
              ${selectedRecommendation.mapped_action ? `<span class="pill">action=${selectedRecommendation.mapped_action}</span>` : ''}
              ${selectedRecommendation.rationale_signals?.map(signal => `<span class="pill">signal=${signal}</span>`).join('') || ''}
              ${selectedRecommendation.decision_updated_at ? `<span class="pill">updated=${selectedRecommendation.decision_updated_at}</span>` : ''}
            </div>
          </div>
        `;
      }
      if (selectedPair) {
        const relatedConflicts = allConflictRows.filter(item =>
          item.left_skill_id === selectedPair.left_skill_id && item.right_skill_id === selectedPair.right_skill_id ||
          item.left_skill_id === selectedPair.right_skill_id && item.right_skill_id === selectedPair.left_skill_id
        );
        const relatedRecommendations = allRecommendationRows.filter(item =>
          [selectedPair.left_skill_id, selectedPair.right_skill_id].every(skillId => (item.skill_ids || []).includes(skillId))
        );
        const relatedRiskRows = allRiskRows.filter(row => [selectedPair.left_skill_id, selectedPair.right_skill_id].includes(row.skill_id));
        return `
          <div class="section">
            <h2>Focused Pair Details</h2>
            <div class="stats-grid">
              <div class="stat-card"><div class="stat-label">Pair</div><div class="stat-value">${selectedPair.left_skill_id}↔${selectedPair.right_skill_id}</div></div>
              <div class="stat-card"><div class="stat-label">Risk Rows</div><div class="stat-value">${relatedRiskRows.length}</div></div>
              <div class="stat-card"><div class="stat-label">Conflict Cards</div><div class="stat-value">${relatedConflicts.length}</div></div>
              <div class="stat-card"><div class="stat-label">Recommendations</div><div class="stat-value">${relatedRecommendations.length}</div></div>
            </div>
            <div class="pill-row">
              ${relatedRiskRows.map(row => `<span class="pill">${row.skill_id}: rewrite=${row.rewrite_priority}</span>`).join('') || '<span class="muted">No pair skill metrics.</span>'}
            </div>
          </div>
        `;
      }

      if (selectedSkillId) {
        const skill = allRiskRows.find(row => row.skill_id === selectedSkillId);
        const relatedConflicts = allConflictRows.filter(item => [item.left_skill_id, item.right_skill_id].includes(selectedSkillId));
        const relatedRecommendations = allRecommendationRows.filter(item => (item.skill_ids || []).includes(selectedSkillId));
        if (!skill) return '';
        return `
          <div class="section">
            <h2>Focused Skill Details</h2>
            <div class="stats-grid">
              <div class="stat-card"><div class="stat-label">Skill</div><div class="stat-value">${skill.skill_id}</div></div>
              <div class="stat-card"><div class="stat-label">Family</div><div class="stat-value">${skill.family || '-'}</div></div>
              <div class="stat-card"><div class="stat-label">Rewrite Priority</div><div class="stat-value">${skill.rewrite_priority}</div></div>
              <div class="stat-card"><div class="stat-label">Black-hole Risk</div><div class="stat-value">${skill.black_hole_risk}</div></div>
              <div class="stat-card"><div class="stat-label">Competition</div><div class="stat-value">${skill.competition_score}</div></div>
              <div class="stat-card"><div class="stat-label">Anchor Strength</div><div class="stat-value">${skill.anchor_strength_score}</div></div>
            </div>
            <div class="pill-row">
              <span class="pill">related conflicts=${relatedConflicts.length}</span>
              <span class="pill">related recommendations=${relatedRecommendations.length}</span>
            </div>
          </div>
        `;
      }

      return '';
    }

    function renderSkillFocus(focus) {
      if (!focus || !focus.skill_id) return '';
      return `
        <div class="queue-card" style="margin-bottom:16px;">
          <strong>Focus skill: ${focus.skill_id}</strong>
          <div class="muted" style="margin-top:8px;">related conflicts=${focus.related_conflict_count} · related recommendations=${focus.related_recommendation_count}</div>
        </div>
      `;
    }

    function renderRiskTable(rows) {
      if (!rows.length) return '<p class="muted">No risk rows available.</p>';
      return `
        <table>
          <thead>
            <tr>
              <th>Skill</th>
              <th>Family</th>
              <th>Competition</th>
              <th>Anchor</th>
              <th>Black Hole</th>
              <th>Rewrite Priority</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(row => `
              <tr class="clickable-row ${selectedSkillId === row.skill_id ? 'active-row' : ''}" onclick="selectSkill('${row.skill_id}')">
                <td><button class="action-link" type="button">${row.skill_id}</button></td>
                <td>${row.family || '-'}</td>
                <td>${row.competition_score}</td>
                <td>${row.anchor_strength_score}</td>
                <td>${row.black_hole_risk}</td>
                <td>${row.rewrite_priority}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderRecommendationQueue(items) {
      if (!items.length) return '<p class="muted">No recommendations.</p>';
      return items.map(item => {
        const isActive = selectedRecommendationId === item.id;
        const isRelated = !isActive && selectedSkillId
          ? (item.skill_ids || []).includes(selectedSkillId)
          : false;
        const isFiltered = (selectedRecommendationId || selectedSkillId) && !isActive && !isRelated;
        return `
          <div class="queue-card recommendation-card ${isActive ? 'active-row' : ''} ${isRelated ? 'related-row' : ''} ${isFiltered ? 'filtered-row' : ''}" onclick="selectRecommendation('${item.id}')">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
              <strong>${item.summary}</strong>
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
                ${renderDecisionBadge(item.decision_status)}
                <span class="badge">${item.priority}</span>
              </div>
            </div>
            <div class="muted" style="margin-top:8px;">type=${item.type} · confidence=${item.confidence}</div>
            <div class="muted" style="margin-top:6px;">skills: ${(item.skill_ids || []).join(', ') || '-'}</div>
            <div class="pill-row">
              ${item.mapped_action ? `<span class="pill">action=${item.mapped_action}</span>` : ''}
              ${(item.rationale_signals || []).map(signal => `<span class="pill">signal=${signal}</span>`).join('')}
            </div>
            ${renderDecisionControls(item)}
            ${item.mapped_action_notes ? `<div class="focus-note">${item.mapped_action_notes}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    function renderConflictQueue(items) {
      if (!items.length) return '<p class="muted">No conflicts.</p>';
      return items.map(item => {
        const isActive = selectedPair && (
          item.left_skill_id === selectedPair.left_skill_id && item.right_skill_id === selectedPair.right_skill_id ||
          item.left_skill_id === selectedPair.right_skill_id && item.right_skill_id === selectedPair.left_skill_id
        );
        return `
          <div class="queue-card ${isActive ? 'active-row' : ''}">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
              <strong>${item.left_skill_id} ↔ ${item.right_skill_id}</strong>
              <button class="action-link" type="button" onclick="selectPair('${item.left_skill_id}', '${item.right_skill_id}')">Focus pair</button>
            </div>
            <div class="muted" style="margin-top:8px;">competition=${item.competition_risk} · overlap=${item.overlap_score}</div>
            <div class="muted" style="margin-top:6px;">direction=${item.interference_direction}</div>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
